<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réservation | Éclat Studio</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/themes.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html" aria-label="Éclat Studio accueil">
          <img src="../assets/images/logo.svg" alt="Éclat Studio" />
          <span>Éclat Studio</span>
        </a>
        <button class="menu-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Ouvrir le menu">
          <span></span><span></span><span></span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Navigation principale">
          <a href="../index.html" data-i18n="navHome">Accueil</a>
          <a href="about.html" data-i18n="navAbout">À propos</a>
          <a href="services.html" data-i18n="navServices">Services</a>
          <a href="pricing.html" data-i18n="navPricing">Tarifs</a>
          <a href="booking.html" data-i18n="navBooking">Réservation</a>
          <a href="contact.html" data-i18n="navContact">Contact</a>
        </nav>
        <div class="header-actions">
          <button id="themeToggle" class="icon-button" type="button" aria-label="Basculer le thème"><span aria-hidden="true">☀️</span></button>
          <select id="languageSwitcher" class="lang-switch" aria-label="Choisir la langue">
            <option value="fr">FR</option>
            <option value="en">EN</option>
          </select>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <p class="eyebrow" data-i18n="navBooking">Réservation</p>
          <h1 data-i18n="pageBookingTitle">Réserver votre créneau</h1>
          <p class="lead" data-i18n="pageBookingIntro">Choisissez le service, la date et l’horaire qui vous conviennent.</p>
        </div>
      </section>

      <section class="page-content">
        <div class="container card-grid">
          <article class="form-card">
            <form id="bookingForm" novalidate>
              <div class="form-grid">
                <label>
                  <span data-i18n="bookingServiceLabel">Service</span>
                  <select name="service" required>
                    <option value="">--</option>
                    <option>Éclat visage</option>
                    <option>Coupure signature</option>
                    <option>Manucure luxe</option>
                    <option>Massage détente</option>
                  </select>
                </label>
                <label>
                  <span data-i18n="bookingDateLabel">Date</span>
                  <input type="date" name="date" required />
                </label>
                <label>
                  <span data-i18n="bookingTimeLabel">Horaire</span>
                  <select name="time" required>
                    <option value="">--</option>
                    <option>09:00</option>
                    <option>10:30</option>
                    <option>13:00</option>
                    <option>16:30</option>
                  </select>
                </label>
                <label>
                  <span data-i18n="bookingNameLabel">Nom complet</span>
                  <input type="text" name="name" required />
                </label>
                <label>
                  <span data-i18n="bookingEmailLabel">Email</span>
                  <input type="email" name="email" required />
                </label>
                <label>
                  <span data-i18n="bookingPhoneLabel">Téléphone</span>
                  <input type="tel" name="phone" required />
                </label>
                <label class="full-width">
                  <span data-i18n="bookingMessageLabel">Informations complémentaires</span>
                  <textarea name="message"></textarea>
                </label>
              </div>
              <div class="form-actions">
                <button class="button primary" type="submit" data-i18n="bookingSubmit">Envoyer la demande</button>
                <p class="form-message" id="bookingFeedback" role="status" aria-live="polite"></p>
              </div>
            </form>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© 2026 Éclat Studio</p>
        <div class="footer-links">
          <a href="contact.html">Contact</a>
          <a href="faq.html">FAQ</a>
        </div>
      </div>
    </footer>

    <script src="../js/translations.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/booking.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
